title: 'Page builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      localizable: true
      hide_display: true
      collapse: true
      listable: false
      display: 'Page builder'
      button_label: 'Add block'
      sets:
        hero:
          display: Hero
          instructions: 'Hero block.'
          icon: hero-image-above-text
          image: hero.jpeg
          fields:
            -
              import: hero
        text_editor:
          display: 'Text editor'
          instructions: 'Render a title, rich text, and optional button.'
          icon: text-formatting-all-caps
          fields:
            -
              import: text_editor
        image_aside:
          display: 'Image Aside'
          instructions: 'Text block with image aligned left or right.'
          icon: media-image-camera
          fields:
            -
              import: image_aside
        featured_grid:
          display: 'Featured Grid'
          instructions: 'Show selected developments as cards.'
          icon: dashboard-layout
          fields:
            -
              import: featured_grid
        logos_bar:
          display: 'Logos Bar'
          instructions: 'Display regulation agency logos from company information globals.'
          icon: dashboard-layout
          fields:
            -
              import: logos_bar
        image_and_text:
          display: 'Image and text'
          instructions: 'Image and text based blocks.'
          icon: hero-image-above-text
          sets:
            article:
              display: Article
              instructions: 'Long form content, can be expanded with media like figures, video, quotes or tables.'
              icon: text-formatting-image-bottom
              image: article.jpeg
              fields:
                -
                  import: article
        interactive:
          display: Interactive
          instructions: 'Interactive blocks.'
          icon: programming-script-code
          sets:
            form:
              display: Form
              instructions: 'Select and render a form.'
              icon: mail-chat-bubble-text
              image: form.jpeg
              fields:
                -
                  import: form
            cards:
              display: Cards
              instructions: 'Show linkable cards with text.'
              icon: link
              image: cards.jpeg
              fields:
                -
                  import: cards
