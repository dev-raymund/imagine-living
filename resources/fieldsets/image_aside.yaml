title: 'Image Aside'
fields:
  -
    handle: variant
    field:
      options:
        default: Default
        wide: Wide
      type: select
      default: default
      localizable: true
      listable: false
      display: Variant
  -
    handle: image_side
    field:
      options:
        right: Right
        left: Left
      type: select
      default: right
      localizable: true
      listable: false
      display: 'Image Side'
      width: 50
  -
    handle: background
    field:
      options:
        gray: Gray
        white: White
      type: select
      default: gray
      localizable: true
      listable: false
      display: Background
      width: 50
  -
    handle: title
    field:
      input_type: text
      type: text
      localizable: true
      listable: false
      display: Title
  -
    handle: image
    field: common.image
    config:
      container: assets
      localizable: true
      display: Image
  -
    handle: bard
    field:
      buttons:
        - h2
        - h3
        - h4
        - h5
        - h6
        - paragraph
        - bold
        - italic
        - underline
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
      link_noopener: true
      container: files
      fullscreen: true
      allow_source: true
      type: bard
      replicator_preview: false
      localizable: true
      display: Bard
      always_save: false
      remove_empty_nodes: true
      smart_typography: true
  -
    handle: text
    field:
      input_type: text
      type: text
      localizable: true
      listable: false
      display: Text
      width: 33
  -
    handle: url
    field:
      type: link
      localizable: true
      listable: false
      display: URL
      width: 66
